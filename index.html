<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Recetario">
<meta name="theme-color" content="#FF6B35">
<link rel="manifest" href="manifest.json">
<title>Recetario</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --orange: #FF6B35;
    --orange-light: #FFF0EA;
    --orange-dark: #C94E1E;
    --green: #4CAF50;
    --green-light: #E8F5E9;
    --green-dark: #2E7D32;
    --yellow: #FFC107;
    --purple: #9C27B0;
    --blue: #2196F3;
    --pink: #E91E63;
    --bg: #F8F4EF;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --text-soft: #666666;
    --border: #EBEBEB;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* HEADER */
  .header {
    background: var(--orange);
    padding: 56px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .header-title {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .header-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    margin-top: 1px;
  }
  .btn-add-header {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    color: #fff;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add-header:active { background: rgba(255,255,255,0.35); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 8px;
  }
  .tab {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab-all { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.85); }
  .tab-all.active { background: #fff; color: var(--orange); }
  .tab-fit { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.85); }
  .tab-fit.active { background: var(--green); color: #fff; }

  /* SEARCH */
  .search-bar {
    padding: 12px 16px 0;
  }
  .search-input {
    width: 100%;
    padding: 11px 16px 11px 40px;
    border-radius: 12px;
    border: none;
    background: #fff;
    font-size: 15px;
    color: var(--text);
    box-shadow: var(--shadow);
    position: relative;
  }
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    color: var(--text-soft);
    pointer-events: none;
  }

  /* CONTENT */
  .content {
    padding: 16px;
    padding-bottom: 100px;
  }

  /* CATEGORY LABEL */
  .category-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-soft);
    margin: 16px 0 8px;
  }

  /* RECIPE CARDS */
  .recipes-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .recipe-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    box-shadow: var(--shadow);
    border: 1.5px solid transparent;
    transition: transform 0.12s, box-shadow 0.12s;
    position: relative;
    overflow: hidden;
  }
  .recipe-card:active { transform: scale(0.985); box-shadow: var(--shadow-md); }
  .recipe-card.fit-card { border-color: var(--green); }
  .recipe-card.fit-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--green);
    border-radius: 4px 0 0 4px;
  }

  .recipe-emoji {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }
  .recipe-emoji.normal { background: var(--orange-light); }
  .recipe-emoji.fit { background: var(--green-light); }

  .recipe-info { flex: 1; min-width: 0; }
  .recipe-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .recipe-meta {
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 3px;
  }

  .fit-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--green-light);
    color: var(--green-dark);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .card-arrow {
    color: #ccc;
    font-size: 18px;
    flex-shrink: 0;
  }

  /* DETAIL VIEW */
  .detail-view {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    max-width: 430px;
    margin: 0 auto;
  }
  .detail-view.open { transform: translateX(0); }

  .detail-header {
    padding: 56px 20px 24px;
    position: relative;
  }
  .detail-header.normal { background: var(--orange); }
  .detail-header.fit { background: linear-gradient(135deg, var(--green) 0%, #43A047 100%); background: var(--green); }

  .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: rgba(255,255,255,0.85);
    font-size: 15px;
    cursor: pointer;
    margin-bottom: 16px;
    border: none;
    background: none;
    padding: 0;
  }
  .btn-back:active { color: #fff; }

  .detail-emoji-big {
    font-size: 52px;
    margin-bottom: 12px;
    display: block;
  }
  .detail-title {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .detail-fit-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.25);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 8px;
  }

  .detail-body {
    padding: 20px 16px;
  }

  .section-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-soft);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .icon-ing { background: #FFF3E0; }
  .icon-steps { background: #E3F2FD; }

  .ingredient-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.4;
  }
  .ingredient-item:last-child { border-bottom: none; }
  .ingredient-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }
  .dot-normal { background: var(--orange); }
  .dot-fit { background: var(--green); }
  .ingredient-subgroup {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 10px 0 4px;
  }

  .step-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.5;
  }
  .step-item:last-child { border-bottom: none; }
  .step-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-num-normal { background: var(--orange-light); color: var(--orange-dark); }
  .step-num-fit { background: var(--green-light); color: var(--green-dark); }
  .step-text { flex: 1; }

  /* ADD MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    padding: 8px 20px 40px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: #ddd;
    border-radius: 2px;
    margin: 12px auto 20px;
  }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--text);
  }

  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-soft);
    margin-bottom: 6px;
    display: block;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-size: 15px;
    color: var(--text);
    font-family: inherit;
    transition: border-color 0.15s;
    outline: none;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--orange);
  }
  .form-textarea { min-height: 90px; resize: vertical; }

  .fit-toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .fit-toggle.active { border-color: var(--green); background: var(--green-light); }
  .toggle-switch {
    width: 44px; height: 26px;
    background: #ddd;
    border-radius: 13px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-switch.on { background: var(--green); }
  .toggle-knob {
    width: 20px; height: 20px;
    background: #fff;
    border-radius: 50%;
    position: absolute;
    top: 3px; left: 3px;
    transition: left 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle-switch.on .toggle-knob { left: 21px; }
  .toggle-label { font-size: 15px; font-weight: 600; color: var(--text); }
  .toggle-sub { font-size: 12px; color: var(--text-soft); }

  .emoji-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .emoji-opt {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: 2px solid transparent;
    background: var(--bg);
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .emoji-opt.selected { border-color: var(--orange); background: var(--orange-light); }

  .btn-save {
    width: 100%;
    padding: 15px;
    background: var(--orange);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .btn-save:active { background: var(--orange-dark); }

  /* LOADING */
  .loading-screen {
    position: fixed; inset: 0;
    background: var(--orange);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.4s;
  }
  .loading-screen.hidden { opacity: 0; pointer-events: none; }
  .loading-emoji { font-size: 60px; margin-bottom: 16px; animation: pulse 1.2s infinite; }
  .loading-title { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .loading-sub { font-size: 14px; color: rgba(255,255,255,0.75); margin-top: 6px; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-soft);
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 14px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1A1A1A;
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    z-index: 500;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* DELETE BTN */
  .btn-delete {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #FEE2E2;
    color: #DC2626;
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    width: 100%;
    justify-content: center;
  }
  .btn-delete:active { background: #FECACA; }

  /* COUNTER BADGE */
  .count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.3);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    min-width: 20px;
    height: 20px;
    border-radius: 10px;
    padding: 0 6px;
    margin-left: 6px;
  }

  .notes-card {
    background: #FFFBEB;
    border: 1.5px solid #FDE68A;
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 12px;
    font-size: 13px;
    color: #92400E;
    line-height: 1.5;
  }

  /* INSTALL BANNER */
  .install-banner {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: #1A1A1A;
    color: #fff;
    padding: 12px 20px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 400;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    white-space: nowrap;
  }
  .install-banner.show { transform: translateX(-50%) translateY(0); }
  .install-banner-text { font-size: 14px; font-weight: 500; }
  .install-banner-text span { font-size: 12px; color: rgba(255,255,255,0.6); display: block; }
  .btn-install {
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-install-dismiss {
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0 0 0 4px;
  }

  /* Safe area */
  @supports (padding: max(0px)) {
    .header { padding-top: max(56px, env(safe-area-inset-top, 20px) + 16px); }
    .detail-header { padding-top: max(56px, env(safe-area-inset-top, 20px) + 16px); }
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-emoji">🍳</div>
  <div class="loading-title">Recetario</div>
  <div class="loading-sub">Cargando recetas...</div>
</div>

<div class="toast" id="toast"></div>

<!-- INSTALL BANNER -->
<div class="install-banner" id="installBanner">
  <div class="install-banner-text">
    📲 Instalar Recetario
    <span>Acceso rápido desde el móvil</span>
  </div>
  <button class="btn-install" id="btnInstall">Instalar</button>
  <button class="btn-install-dismiss" onclick="dismissInstall()">×</button>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">🍳 Recetario</div>
      <div class="header-subtitle" id="recipeCount">Cargando...</div>
    </div>
    <div class="btn-add-header" onclick="openAddModal()">+</div>
  </div>
  <div class="tabs">
    <button class="tab tab-all active" onclick="setTab('all')">Todas <span class="count-badge" id="countAll">0</span></button>
    <button class="tab tab-fit" onclick="setTab('fit')">🥗 Fit <span class="count-badge" id="countFit">0</span></button>
  </div>
</div>

<!-- SEARCH -->
<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="search" placeholder="Buscar recetas..." id="searchInput" oninput="renderList()">
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="recipes-grid" id="recipesGrid"></div>
</div>

<!-- DETAIL VIEW -->
<div class="detail-view" id="detailView">
  <div class="detail-header" id="detailHeader">
    <button class="btn-back" onclick="closeDetail()">← Volver</button>
    <span class="detail-emoji-big" id="detailEmoji"></span>
    <div class="detail-title" id="detailTitle"></div>
    <div id="detailFitBadge"></div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✨ Nueva receta</div>

    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input class="form-input" id="formName" placeholder="Ej: Tortitas de avena" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Emoji</label>
      <div class="emoji-picker" id="emojiPicker">
        <div class="emoji-opt selected" data-emoji="🍽️" onclick="selectEmoji(this)">🍽️</div>
        <div class="emoji-opt" data-emoji="🥗" onclick="selectEmoji(this)">🥗</div>
        <div class="emoji-opt" data-emoji="🍳" onclick="selectEmoji(this)">🍳</div>
        <div class="emoji-opt" data-emoji="🥘" onclick="selectEmoji(this)">🥘</div>
        <div class="emoji-opt" data-emoji="🍲" onclick="selectEmoji(this)">🍲</div>
        <div class="emoji-opt" data-emoji="🥩" onclick="selectEmoji(this)">🥩</div>
        <div class="emoji-opt" data-emoji="🍗" onclick="selectEmoji(this)">🍗</div>
        <div class="emoji-opt" data-emoji="🥚" onclick="selectEmoji(this)">🥚</div>
        <div class="emoji-opt" data-emoji="🫙" onclick="selectEmoji(this)">🫙</div>
        <div class="emoji-opt" data-emoji="🍰" onclick="selectEmoji(this)">🍰</div>
        <div class="emoji-opt" data-emoji="🍫" onclick="selectEmoji(this)">🍫</div>
        <div class="emoji-opt" data-emoji="🥐" onclick="selectEmoji(this)">🥐</div>
        <div class="emoji-opt" data-emoji="🍞" onclick="selectEmoji(this)">🍞</div>
        <div class="emoji-opt" data-emoji="🥙" onclick="selectEmoji(this)">🥙</div>
        <div class="emoji-opt" data-emoji="🍜" onclick="selectEmoji(this)">🍜</div>
        <div class="emoji-opt" data-emoji="🌮" onclick="selectEmoji(this)">🌮</div>
        <div class="emoji-opt" data-emoji="🫔" onclick="selectEmoji(this)">🫔</div>
        <div class="emoji-opt" data-emoji="🥜" onclick="selectEmoji(this)">🥜</div>
        <div class="emoji-opt" data-emoji="🫐" onclick="selectEmoji(this)">🫐</div>
        <div class="emoji-opt" data-emoji="🥑" onclick="selectEmoji(this)">🥑</div>
      </div>

      "Cortar la verdura y mezclar con sal, aceite, ajo en polvo y pimienta. Cocinar en sartén o AirFryer 18–20 min a 190 °C.",

      "1 limón",
      "1 diente de ajo",
      "Sal",

    ],

      "Sacar la pulpa con una cuchara y triturar junto al queso fresco batido, el tahini, el zumo de medio limón, el ajo y las especias.",

// ═══════════════════════════════════════════════
// FIREBASE — Escucha en tiempo real
// ═══════════════════════════════════════════════
let initialized = false;

recipesRef.on('value', (snapshot) => {
  const data = snapshot.val();
  if (!data) {
    // Primera vez: cargar recetas iniciales
    if (!initialized) {
      initialized = true;
      initialRecipes.forEach(r => {
        recipesRef.push({ ...r, createdAt: Date.now() });
      });
    }
  } else {
    allRecipes = Object.entries(data).map(([id, val]) => ({ id, ...val }));
    allRecipes.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    renderList();
    updateCounts();
    hideLoading();
    initialized = true;
  }
});

function hideLoading() {
  document.getElementById('loadingScreen').classList.add('hidden');
}

// ═══════════════════════════════════════════════
// RENDER LISTA
// ═══════════════════════════════════════════════
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab-' + tab).classList.add('active');
  renderList();
}

function renderList() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  let filtered = allRecipes.filter(r => {
    const matchTab = currentTab === 'all' || (currentTab === 'fit' && r.fit);
    const matchSearch = !search || r.name.toLowerCase().includes(search);
    return matchTab && matchSearch;
  });

  const grid = document.getElementById('recipesGrid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-emoji">🍽️</div>
      <div class="empty-title">No hay recetas</div>
      <div class="empty-sub">${search ? 'Prueba con otro término' : 'Añade la primera receta pulsando el +'}</div>
    </div>`;
    return;
  }

  // Agrupar: normales y fit
  const normal = filtered.filter(r => !r.fit);
  const fit = filtered.filter(r => r.fit);
  let html = '';

  if (currentTab === 'all') {
    if (normal.length > 0) {
      if (fit.length > 0) html += `<div class="category-label">🍽️ Todas las recetas</div>`;
      normal.forEach(r => html += renderCard(r));
    }
    if (fit.length > 0) {
      html += `<div class="category-label">🥗 Recetas Fit</div>`;
      fit.forEach(r => html += renderCard(r));
    }
  } else {
    fit.forEach(r => html += renderCard(r));
  }

  grid.innerHTML = html;
}

function renderCard(r) {
  const isFitCard = r.fit;
  const ingCount = (r.ingredients || []).filter(i => !i.startsWith('——') && !i.endsWith(':') && i !== '').length;
  const fitBadge = isFitCard ? `<div class="fit-badge">✓ Fit</div>` : '';
  return `<div class="recipe-card ${isFitCard ? 'fit-card' : ''}" onclick="openDetail('${r.id}')">
    <div class="recipe-emoji ${isFitCard ? 'fit' : 'normal'}">${r.emoji || '🍽️'}</div>
    <div class="recipe-info">
      <div class="recipe-name">${r.name}</div>
      <div class="recipe-meta">${ingCount} ingredientes · ${(r.steps || []).length} pasos</div>
    </div>
    ${fitBadge}
    <div class="card-arrow">›</div>
  </div>`;
}

function updateCounts() {
  const all = allRecipes.length;
  const fit = allRecipes.filter(r => r.fit).length;
  document.getElementById('countAll').textContent = all;
  document.getElementById('countFit').textContent = fit;
  document.getElementById('recipeCount').textContent = `${all} recetas · ${fit} fit`;
}

// ═══════════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════════
function openDetail(id) {
  const r = allRecipes.find(x => x.id === id);
  if (!r) return;
  currentDetailId = id;

  document.getElementById('detailHeader').className = 'detail-header ' + (r.fit ? 'fit' : 'normal');
  document.getElementById('detailEmoji').textContent = r.emoji || '🍽️';
  document.getElementById('detailTitle').textContent = r.name;
  document.getElementById('detailFitBadge').innerHTML = r.fit ? `<div class="detail-fit-badge">✓ Receta Fit</div>` : '';

  const dotClass = r.fit ? 'dot-fit' : 'dot-normal';
  const stepNumClass = r.fit ? 'step-num-fit' : 'step-num-normal';

  let ingredientsHTML = '';
  (r.ingredients || []).forEach(ing => {
    if (ing.startsWith('——')) {
      ingredientsHTML += `<div style="height:4px;"></div>`;
    } else if (ing.endsWith(':')) {
      ingredientsHTML += `<div class="ingredient-subgroup">${ing}</div>`;
    } else if (ing) {
      ingredientsHTML += `<div class="ingredient-item">
        <div class="ingredient-dot ${dotClass}"></div>
        <span>${ing}</span>
      </div>`;
    }
  });

  let stepsHTML = '';
  (r.steps || []).forEach((step, i) => {
    stepsHTML += `<div class="step-item">
      <div class="step-num ${stepNumClass}">${i+1}</div>
      <div class="step-text">${step}</div>
    </div>`;
  });

  let notesHTML = r.notes ? `<div class="notes-card">💡 ${r.notes}</div>` : '';

  document.getElementById('detailBody').innerHTML = `
    ${notesHTML}
    <div class="section-card">
      <div class="section-title">
        <div class="section-title-icon icon-ing">🛒</div>
        Ingredientes
      </div>
      ${ingredientsHTML}
    </div>
    <div class="section-card">
      <div class="section-title">
        <div class="section-title-icon icon-steps">👨‍🍳</div>
        Paso a paso
      </div>
      ${stepsHTML}
    </div>
    <button class="btn-delete" onclick="deleteRecipe('${r.id}')">🗑️ Eliminar receta</button>
  `;

  document.getElementById('detailView').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('open');
  document.body.style.overflow = '';
  currentDetailId = null;
}

function deleteRecipe(id) {
  if (!confirm('¿Seguro que quieres eliminar esta receta?')) return;
  recipesRef.child(id).remove();
  closeDetail();
  showToast('Receta eliminada');
}

// ═══════════════════════════════════════════════
// ADD MODAL
// ═══════════════════════════════════════════════
function openAddModal() {
  document.getElementById('formName').value = '';
  document.getElementById('formIngredients').value = '';
  document.getElementById('formSteps').value = '';
  document.getElementById('formNotes').value = '';
  isFit = false;
  selectedEmoji = '🍽️';
  document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
  document.querySelector('[data-emoji="🍽️"]').classList.add('selected');
  document.getElementById('toggleSwitch').classList.remove('on');
  document.getElementById('fitToggle').classList.remove('active');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('formName').focus(), 300);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function selectEmoji(el) {
  document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedEmoji = el.dataset.emoji;
}

function toggleFit() {
  isFit = !isFit;
  document.getElementById('toggleSwitch').classList.toggle('on', isFit);
  document.getElementById('fitToggle').classList.toggle('active', isFit);
}

function saveRecipe() {
  const name = document.getElementById('formName').value.trim();
  if (!name) { showToast('Añade un nombre a la receta'); return; }

  const rawIng = document.getElementById('formIngredients').value.trim();
  const rawSteps = document.getElementById('formSteps').value.trim();
  const notes = document.getElementById('formNotes').value.trim();

  const ingredients = rawIng ? rawIng.split('\n').map(l => l.trim()).filter(Boolean) : [];
  const steps = rawSteps ? rawSteps.split('\n').map(l => l.trim()).filter(Boolean) : [];

  const newRecipe = {
    name,
    emoji: selectedEmoji,
    fit: isFit,
    ingredients,
    steps,
    notes: notes || null,
    createdAt: Date.now()
  };

  recipesRef.push(newRecipe);
  closeModal();
  showToast('¡Receta guardada! 🎉');
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════
// PWA INSTALL
// ═══════════════════════════════════════════════
let deferredPrompt = null;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    document.getElementById("installBanner").classList.add("show");
  }, 2000);
});

document.getElementById("btnInstall").addEventListener("click", async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById("installBanner").classList.remove("show");
  if (outcome === "accepted") showToast("¡App instalada! 🎉");
});

window.addEventListener("appinstalled", () => {
  document.getElementById("installBanner").classList.remove("show");
  deferredPrompt = null;
});

function dismissInstall() {
  document.getElementById("installBanner").classList.remove("show");
}

// Swipe para cerrar el detalle
let touchStartX = 0;
document.getElementById('detailView').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('detailView').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (dx > 80) closeDetail();
}, { passive: true });
</script>
